#################################
#           Global              #
#################################

# Optimized shaders for lower-end GPU: Mode A (Fast)
# glsl-shaders="~~/shaders/Anime4K_Clamp_Highlights.glsl:~~/shaders/Anime4K_Restore_CNN_M.glsl:~~/shaders/Anime4K_Upscale_CNN_x2_M.glsl:~~/shaders/Anime4K_AutoDownscalePre_x2.glsl:~~/shaders/Anime4K_AutoDownscalePre_x4.glsl:~~/shaders/Anime4K_Upscale_CNN_x2_S.glsl"
# Clean, fast, and high-quality for GTX 1060
glsl-shaders="~~/shaders/Anime4K_Clamp_Highlights.glsl:~~/shaders/Anime4K_Restore_CNN_M.glsl:~~/shaders/Anime4K_Upscale_CNN_x2_M.glsl:~~/shaders/Anime4K_AutoDownscalePre_x2.glsl:~~/shaders/Anime4K_AutoDownscalePre_x4.glsl"

# Do not close the window after video finishes
keep-open=yes

# Save the position I left off on if I exit
# save-position-on-quit=no

# Start mpv in fullscreen mode
fs=yes

osc = no
border = no # Optional, but recommended

#Disable the whole OSD (if you use an external one like uosc)
# osc=no

#Level of OSD, some GUIs might surpress mpv OSD, so you can add it back
# osd-level=1

#Don't show a huge volume box on screen when turning the volume up/down
osd-bar=no

#Audio language priority
alang=ja,jp,jpn,en,eng

# Set specified volume level on start of program
volume=72

# save screenshots as png
screenshot-format=png

# set save location for screenshots
screenshot-directory=/home/kuda/Pictures/MPV

# Pre-loads 5 seconds of video to prevent audio/video stutter
demuxer-readahead-secs=5 # for external HDD
# Forces mpv to use a RAM buffer for all files, even local ones
cache=yes # for external HDD

#################################
#             wm                #
#################################
[wm-profile]
# --- Core Performance & System ---
x11-bypass-compositor=yes # Disables window effects (Picom/Compton) to stop frame drops and stutter
vo=gpu # Required to ensure the GPU handles the rendering/shaders
gpu-api=opengl # Forces OpenGL; more stable than Vulkan for NVIDIA + VA-API on X11
gpu-context=x11egl # Modern bridge for NVIDIA + VA-API stability on X11/wm

# --- Hardware Acceleration ---
hwdec=nvdec-copy # Decodes on GPU but allows shaders (Anime4K) to process the frames
opengl-pbo=yes # Speeds up frame data transfer between the decoder and the GPU

# --- CPU & Buffering Optimization ---
vd-lavc-threads=0 # Let decoder decide how many threads to your CPU cores to prevent over-scheduling
demuxer-max-bytes=500MiB
demuxer-max-bytes=500MiB # Max amount of video to buffer ahead in RAM
demuxer-max-back-bytes=100MiB # Amount of played video to keep in RAM for instant seeking
swapchain-depth=3 # Creates a small GPU frame queue to smooth out timing glitches

# --- Smooth Motion ---
# video-sync=display-resample # Resamples audio to match monitor refresh rate; fixes 24fps stutter
# interpolation=yes # Creates missing frames to match monitor Hz for smoother movement
# tscale=oversample # The specific math/filter used to create the smooth interpolated frames
# display-fps-override=60 # Replace 60 with your actual monitor refresh rate
